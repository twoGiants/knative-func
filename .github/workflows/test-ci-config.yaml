name: Test CI Config (act)
on:
  workflow_dispatch:
  push:
    branches:
      - issue-783-e2e-tests-with-act
jobs:
  test-ci-config:
    name: E2E - CI Config
    runs-on: ubuntu-latest
    env:
      FUNC_CLUSTER_RETRIES: 5
    steps:
      - uses: actions/checkout@v4
      - uses: knative/actions/setup-go@main
      - uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_swap: true
          rm_cmd: "rmz"
      - name: Install Binaries
        run: ./hack/binaries.sh
      - name: Allocate Cluster
        run: ./hack/cluster.sh
      - name: Start Local Registry
        run: ./hack/registry.sh
      - name: Prepare Images
        run: ./hack/images.sh
      - name: Install func cli
        uses: functions-dev/action@main
        with:
          version: nightly
          name: func
      - name: Install act
        run: curl -sfL https://raw.githubusercontent.com/nektos/act/master/install.sh | sudo bash -s -- -b /usr/local/bin
      - name: Test generated CI workflow
        run: |
          FUNCDIR="$(mktemp -d)/test-ci-func"
          mkdir -p "$FUNCDIR"
          func create --language go --template http "$FUNCDIR"
          cd "$FUNCDIR"
          git init -b main
          git config user.email "test@test.com"
          git config user.name "test"
          git add . && git commit -m "init"
          FUNC_ENABLE_CI_CONFIG=true func config ci --registry-login=false
          act push -P ubuntu-latest=-self-hosted \
            -W .github/workflows/func-deploy.yaml \
            -s KUBECONFIG="$(cat $GITHUB_WORKSPACE/hack/bin/kubeconfig.yaml)" \
            --var REGISTRY_URL=localhost:50000/func